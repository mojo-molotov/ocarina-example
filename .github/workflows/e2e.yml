name: e2e CI

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    environment: OC

    services:
      redis:
        image: redis:8.2.5
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Cache virtual environment
        id: cache-venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            venv-${{ runner.os }}-py-

      - name: Set venv paths (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          echo "VENV_BIN=.venv/bin" >> $GITHUB_ENV
          echo "VENV_PYTHON=.venv/bin/python" >> $GITHUB_ENV
          echo "VENV_PIP=.venv/bin/pip" >> $GITHUB_ENV

      - name: Install geckodriver
        run: |
          GECKO_VERSION=0.35.0
          wget https://github.com/mozilla/geckodriver/releases/download/v$GECKO_VERSION/geckodriver-v$GECKO_VERSION-linux64.tar.gz
          tar -xvzf geckodriver-v$GECKO_VERSION-linux64.tar.gz
          chmod +x geckodriver

      - name: Setup Firefox
        uses: browser-actions/setup-firefox@fcf821c621167805dd63a29662bd7cb5676c81a8

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          make install-on-ci

      - name: Verify venv (fallback install)
        run: |
          if [ ! -f $VENV_PYTHON ] || [ ! -f $VENV_PIP ]; then
            echo "⚠️ Venv incomplete, reinstalling..."
            rm -rf .venv
            make install-on-ci
          fi

      - name: Create activate venv command (Linux/macOS)
        if: runner.os != 'Windows'
        run: echo "VENV_ACTIVATE=.venv/bin/activate" >> $GITHUB_ENV

      - name: Run tests
        env:
          REDIS_URL: redis://localhost:6379
          DASH_USERNAME: SacredFigatellu
          DASH_PASSWORD: figatellu
          IGOR_API_KEY: ${{ secrets.IGOR_API_KEY }}

        run: |
          source $VENV_ACTIVATE
          pip install --index-url https://test.pypi.org/simple/ ocarina==0.2.33
          python -u ./src/main.py --driver-path ./geckodriver --browser firefox --workers 3

      - name: Sync and enumerate traces
        if: always()
        run: |
          sync
          find $GITHUB_WORKSPACE/.screenshots -type f
          find $GITHUB_WORKSPACE/.ocarina_logs -type f
          find $GITHUB_WORKSPACE/.reports -type f

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots
          path: ${{ github.workspace }}/.screenshots/
          retention-days: 30
          include-hidden-files: true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs
          path: ${{ github.workspace }}/.ocarina_logs/
          retention-days: 30
          include-hidden-files: true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: ${{ github.workspace }}/.reports/
          retention-days: 30
          include-hidden-files: true
